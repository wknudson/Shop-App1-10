# Render Blueprint: Python FastAPI web service + daily POST /train cron.
# In the dashboard, set DATABASE_URL, SCORING_SECRET (web + cron), and
# SCORING_SERVICE_URL on the cron job (e.g. https://your-service.onrender.com).

services:
  - type: web
    name: shop-scoring-api
    runtime: python
    rootDir: jobs
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SCORING_SECRET
        sync: false

  - type: cron
    name: shop-fraud-train-daily
    schedule: "0 8 * * *"
    buildCommand: "true"
    startCommand: curl -fsS -X POST "$SCORING_SERVICE_URL/train" -H "X-Scoring-Secret: $SCORING_SECRET"
    envVars:
      - key: SCORING_SECRET
        sync: false
      - key: SCORING_SERVICE_URL
        sync: false
